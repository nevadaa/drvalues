<script>
/* --------------------------
   READ QUERY VALUES
--------------------------- */
function getQueryVariable(name) {
    const params = new URLSearchParams(window.location.search);
    return parseFloat(params.get(name)) || 0;
}

const sol = getQueryVariable("sol");
const ohc = getQueryVariable("ohc");
const epg = getQueryVariable("epg");
const atd = getQueryVariable("atd");
const sog = getQueryVariable("sog");
const poe = getQueryVariable("poe");
const dai = getQueryVariable("dai");
const civ = getQueryVariable("civ");

/* --------------------------
   BAR RENDERING
--------------------------- */
function setBars(axis, value) {
    // value = % toward RIGHT pole
    const right = document.getElementById(axis + "-right");
    const left = document.getElementById(axis + "-left");

    right.style.width = value + "%";
    left.style.width = (100 - value) + "%";

    // optional text output on bars
    const leftText  = document.getElementById(axis + "-left-text");
    const rightText = document.getElementById(axis + "-right-text");

    if (leftText)  leftText.textContent  = (100 - value) + "%";
    if (rightText) rightText.textContent = value + "%";
}


/* Compute percentages (0 = left pole, 100 = right pole) */
setBars("sol", sol);
setBars("ohc", ohc);
setBars("epg", epg);
setBars("atd", atd);
setBars("sog", sog);
setBars("poe", poe);
setBars("dai", dai);
setBars("civ", civ);


</script>
<script>
window.onload = function () {

    /* ========== CANVAS INIT ========== */
    const c = document.createElement("canvas");
    const ctx = c.getContext("2d");

    c.width = 900;
    c.height = 1250;
    ctx.fillStyle = "#E5E5E5";
    ctx.fillRect(0, 0, c.width, c.height);


    /* ========== UTILS ========== */
    function get(param) {
        return parseFloat(new URLSearchParams(window.location.search).get(param));
    }

    const sol = get("sol");
    const ohc = get("ohc");
    const epg = get("epg");
    const atd = get("atd");
    const sog = get("sog");
    const poe = get("poe");
    const dai = get("dai");
    const civ = get("civ");

    const axisNames = [
        "Source of Legitimacy",
        "Orientation of Historical Change",
        "Epistemic Grounding",
        "Anthropology of Desire",
        "Structure of Governance",
        "Political Economy",
        "Doctrine & Interpretation",
        "Civilizational Mission"
    ];

    const scores = [sol, ohc, epg, atd, sog, poe, dai, civ];

    const leftIcons = [
        "img-sol-left", "img-ohc-left", "img-epg-left", "img-atd-left",
        "img-sog-left", "img-poe-left", "img-dai-left", "img-civ-left"
    ];

    const rightIcons = [
        "img-sol-right", "img-ohc-right", "img-epg-right", "img-atd-right",
        "img-sog-right", "img-poe-right", "img-dai-right", "img-civ-right"
    ];


    /* ========== TITLE ========== */
    ctx.fillStyle = "#222";
    ctx.font = "bold 80px Montserrat";
    ctx.textAlign = "left";
    ctx.fillText("DRValues", 40, 100);

    ctx.font = "300 32px Montserrat";
    ctx.fillText("nevadaa.github.io/drvalues", 40, 150);


    /* ========== DRAW ALL AXES ========== */
    let startY = 230;      // first row position
    const rowHeight = 130; // vertical spacing per axis
    const barX = 160;      // where bars start (icons at 40)
    const barW = 600;      // total width of left+right bars
    const barH = 40;       // bar height

    for (let i = 0; i < 8; i++) {

        let y = startY + i * rowHeight;

        /* AXIS TITLE */
        ctx.fillStyle = "#222";
        ctx.font = "bold 30px Montserrat";
        ctx.textAlign = "left";
        ctx.fillText(axisNames[i], 40, y - 10);


        /* ICONS */
        let leftImg = document.getElementById(leftIcons[i]);
        let rightImg = document.getElementById(rightIcons[i]);
        ctx.drawImage(leftImg, 40, y + 10, 90, 90);
        ctx.drawImage(rightImg, 770, y + 10, 90, 90);


        /* BARS */
        let pctRight = scores[i];
        let pctLeft = 100 - pctRight;

        let leftW = (pctLeft / 100) * barW;
        let rightW = (pctRight / 100) * barW;

        // Left gradient
        let gradLeft = ctx.createLinearGradient(barX, y + 55, barX + leftW, y + 55);
        switch (i) {
            case 0: gradLeft.addColorStop(0, "#A46422"); gradLeft.addColorStop(1, "#C07A35"); break;
            case 1: gradLeft.addColorStop(0, "#D62828"); gradLeft.addColorStop(1, "#B72020"); break;
            case 2: gradLeft.addColorStop(0, "#1E88E5"); gradLeft.addColorStop(1, "#2B9AF0"); break;
            case 3: gradLeft.addColorStop(0, "#DDDDDD"); gradLeft.addColorStop(1, "#FFFFFF"); break;
            case 4: gradLeft.addColorStop(0, "#3949AB"); gradLeft.addColorStop(1, "#4857C2"); break;
            case 5: gradLeft.addColorStop(0, "#43A047"); gradLeft.addColorStop(1, "#55B556"); break;
            case 6: gradLeft.addColorStop(0, "#616161"); gradLeft.addColorStop(1, "#777777"); break;
            case 7: gradLeft.addColorStop(0, "#2E7D32"); gradLeft.addColorStop(1, "#3E8F42"); break;
        }

        ctx.fillStyle = gradLeft;
        ctx.fillRect(barX, y + 55, leftW, barH);

        // Right gradient
        let gradRight = ctx.createLinearGradient(barX + leftW, y + 55, barX + barW, y + 55);
        switch (i) {
            case 0: gradRight.addColorStop(0, "#C6A667"); gradRight.addColorStop(1, "#B99952"); break;
            case 1: gradRight.addColorStop(0, "#5A1A1A"); gradRight.addColorStop(1, "#6D2020"); break;
            case 2: gradRight.addColorStop(0, "#7E3FFF"); gradRight.addColorStop(1, "#6C2AE0"); break;
            case 3: gradRight.addColorStop(0, "#EC407A"); gradRight.addColorStop(1, "#D8346B"); break;
            case 4: gradRight.addColorStop(0, "#FDD835"); gradRight.addColorStop(1, "#E6C630"); break;
            case 5: gradRight.addColorStop(0, "#E53935"); gradRight.addColorStop(1, "#CC2F2C"); break;
            case 6: gradRight.addColorStop(0, "#C21807"); gradRight.addColorStop(1, "#A91506"); break;
            case 7: gradRight.addColorStop(0, "#F9A825"); gradRight.addColorStop(1, "#D79A20"); break;
        }

        ctx.fillStyle = gradRight;
        ctx.fillRect(barX + leftW, y + 55, rightW, barH);


        /* CENTER DIVIDER */
        ctx.fillStyle = "#222";
        ctx.fillRect(barX + barW/2 - 2, y + 50, 4, barH + 10);


        /* PERCENT LABELS */
        ctx.font = "bold 26px Montserrat";
        ctx.textAlign = "left";
        ctx.fillText(`${pctLeft.toFixed(1)}%`, barX + 10, y + 82);

        ctx.textAlign = "right";
        ctx.fillText(`${pctRight.toFixed(1)}%`, barX + barW - 10, y + 82);
    }

    /* EXPORT */
    document.getElementById("banner").src = c.toDataURL();
};
</script>


</script>
