<script>
/* --------------------------
   READ QUERY VALUES
--------------------------- */
function getQueryVariable(name) {
    const params = new URLSearchParams(window.location.search);
    return parseFloat(params.get(name)) || 0;
}

const sol = getQueryVariable("sol");
const ohc = getQueryVariable("ohc");
const epg = getQueryVariable("epg");
const atd = getQueryVariable("atd");
const sog = getQueryVariable("sog");
const poe = getQueryVariable("poe");
const dai = getQueryVariable("dai");
const civ = getQueryVariable("civ");

/* --------------------------
   BAR RENDERING
--------------------------- */
function setBars(axis, value) {
    // value = % toward RIGHT pole
    const right = document.getElementById(axis + "-right");
    const left = document.getElementById(axis + "-left");

    right.style.width = value + "%";
    left.style.width = (100 - value) + "%";

    // optional text output on bars
    const leftText  = document.getElementById(axis + "-left-text");
    const rightText = document.getElementById(axis + "-right-text");

    if (leftText)  leftText.textContent  = (100 - value) + "%";
    if (rightText) rightText.textContent = value + "%";
}


/* Compute percentages (0 = left pole, 100 = right pole) */
setBars("sol", sol);
setBars("ohc", ohc);
setBars("epg", epg);
setBars("atd", atd);
setBars("sog", sog);
setBars("poe", poe);
setBars("dai", dai);
setBars("civ", civ);


</script>
<script>
window.onload = function () {

    /* --------------------------
       CANVAS BASE
    --------------------------- */
    const c = document.createElement("canvas");
    const ctx = c.getContext("2d");
    c.width = 800;
    c.height = 1050;
    ctx.fillStyle = "#EEEEEE";
    ctx.fillRect(0, 0, c.width, c.height);

    /* --------------------------
       FETCH SCORES
    --------------------------- */
    const qs = new URLSearchParams(location.search);
    const sol = parseFloat(qs.get("sol")) || 0;
    const ohc = parseFloat(qs.get("ohc")) || 0;
    const epg = parseFloat(qs.get("epg")) || 0;
    const atd = parseFloat(qs.get("atd")) || 0;
    const sog = parseFloat(qs.get("sog")) || 0;
    const poe = parseFloat(qs.get("poe")) || 0;
    const dai = parseFloat(qs.get("dai")) || 0;
    const civ = parseFloat(qs.get("civ")) || 0;

    const axes = [
        { name: "Source of Legitimacy", value: sol, leftId: "img-sol-left", rightId: "img-sol-right", colors: ["#A46422", "#C07A35", "#C6A667", "#B99952"] },
        { name: "Orientation of Historical Change", value: ohc, leftId: "img-ohc-left", rightId: "img-ohc-right", colors: ["#D62828", "#B72020", "#5A1A1A", "#6D2020"] },
        { name: "Epistemic Grounding", value: epg, leftId: "img-epg-left", rightId: "img-epg-right", colors: ["#1E88E5", "#2B9AF0", "#7E3FFF", "#6C2AE0"] },
        { name: "Anthropology of Desire", value: atd, leftId: "img-atd-left", rightId: "img-atd-right", colors: ["#DDDDDD", "#FFFFFF", "#EC407A", "#D8346B"] },
        { name: "Structure of Governance", value: sog, leftId: "img-sog-left", rightId: "img-sog-right", colors: ["#3949AB", "#4857C2", "#FDD835", "#E6C630"] },
        { name: "Political Economy", value: poe, leftId: "img-poe-left", rightId: "img-poe-right", colors: ["#43A047", "#55B556", "#E53935", "#CC2F2C"] },
        { name: "Doctrine & Interpretation", value: dai, leftId: "img-dai-left", rightId: "img-dai-right", colors: ["#616161", "#777777", "#C21807", "#A91506"] },
        { name: "Civilizational Mission", value: civ, leftId: "img-civ-left", rightId: "img-civ-right", colors: ["#2E7D32", "#3E8F42", "#F9A825", "#D79A20"] }
    ];

    /* --------------------------
       HEADER TEXT
    --------------------------- */
    ctx.fillStyle = "#222";
    ctx.font = "700 70px Montserrat";
    ctx.fillText("DRValues", 20, 85);

    ctx.font = "300 32px Montserrat";
    ctx.fillText("nevadaa.github.io/drvalues", 20, 135);

    /* --------------------------
       DRAW AXES COMPACTLY
    --------------------------- */
    const startY = 190;
    const block = 100;

    axes.forEach((ax, i) => {

        const y = startY + block * i;
        const pct = ax.value;
        const pctLeft = 100 - pct;
        const pctRight = pct;

        /* Axis Label */
        ctx.font = "700 26px Montserrat";
        ctx.fillStyle = "#222";
        ctx.fillText(ax.name, 20, y - 15);

        /* Icons */
        const leftImg  = document.getElementById(ax.leftId);
        const rightImg = document.getElementById(ax.rightId);

        ctx.drawImage(leftImg, 20, y + 5, 80, 80);
        ctx.drawImage(rightImg, 700, y + 5, 80, 80);

        /* Bar background */
        const barY = y + 30;
        ctx.fillStyle = "#222";
        ctx.fillRect(120, barY, 560, 40);

        /* LEFT gradient bar */
        const lg = ctx.createLinearGradient(120, 0, 400, 0);
        lg.addColorStop(0, ax.colors[0]);
        lg.addColorStop(1, ax.colors[1]);
        ctx.fillStyle = lg;
        ctx.fillRect(120, barY + 4, 5.6 * pctLeft - 2, 32);

        /* RIGHT gradient bar */
        const rg = ctx.createLinearGradient(680, 0, 400, 0);
        rg.addColorStop(0, ax.colors[2]);
        rg.addColorStop(1, ax.colors[3]);
        ctx.fillStyle = rg;
        ctx.fillRect(682 - (5.6 * pctRight), barY + 4, 5.6 * pctRight - 2, 32);

        /* Divider (matches your HTML: 10px × 77.5px) */
        ctx.fillStyle = "#222";
        ctx.fillRect(395, y + 7, 10, 77.5);

        /* Percent labels centered */
        ctx.fillStyle = "#222";
        ctx.font = "700 26px Montserrat";
        ctx.textAlign = "center";

        if (pctLeft > 0)  ctx.fillText(pctLeft.toFixed(1) + "%", 120 + (5.6 * pctLeft) / 2, barY + 28);
        if (pctRight > 0) ctx.fillText(pctRight.toFixed(1) + "%", 680 - (5.6 * pctRight) / 2, barY + 28);
    });

    /* --------------------------
       OUTPUT IMAGE
    --------------------------- */
    document.getElementById("banner").src = c.toDataURL("image/png");
};
</script>

</script>
